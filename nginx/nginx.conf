events {
  worker_connections 1024;
}

http {
  # ── Upstream Services ──────────────────────────────────────
  upstream api {
    server api:3000;
  }

  upstream gateway {
    server gateway:3001;
  }

  # ── Rate Limiting Zones ────────────────────────────────────
  # Keyed by IP. Enforced before requests reach services.
  limit_req_zone $binary_remote_addr zone=public:10m   rate=100r/m;
  limit_req_zone $binary_remote_addr zone=ws:10m       rate=10r/s;

  # ── Main Server ────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Max request body size — covers message content (4000 chars) + envelope
    client_max_body_size 16k;

    # ── REST API ──────────────────────────────────────────
    location /api/ {
      limit_req zone=public burst=20 nodelay;

      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Timeouts
      proxy_connect_timeout 5s;
      proxy_send_timeout    10s;
      proxy_read_timeout    30s;
    }

    # ── WebSocket Upgrade ─────────────────────────────────
    location /ws {
      limit_req zone=ws burst=5 nodelay;

      proxy_pass         http://gateway;
      proxy_http_version 1.1;

      # Required headers for WS upgrade
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

      # Keep WS connections alive; gateway closes idle ones after 60s
      proxy_read_timeout 90s;
      proxy_send_timeout 90s;
    }

    # ── Deny Everything Else ──────────────────────────────
    location / {
      return 404;
    }
  }
}